---
name: Build

on:
  push:
    branches-ignore:
      - master
      - main
    tags-ignore:
      - "*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: extractions/setup-just@v4
        with:
          just-version: 1.40.0

      - uses: dorny/paths-filter@v4.0.2
        name: check for changes
        id: changes
        with:
          filters: |
            src:
              - 'cmd/**'
              - 'internal/**'
              - 'go.*'

      - if: steps.changes.outputs.src == 'true'
        name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false

      - if: steps.changes.outputs.src == 'true'
        name: Run tests
        run: just tests

      - if: steps.changes.outputs.src == 'true'
        name: Build
        run: just build
